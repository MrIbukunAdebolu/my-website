<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexus Microgrant Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #0077cc;
      color: white;
    }

    button:hover {
      background: #005fa3;
    }
  </style>
</head>

<body>

  <h1>Nexus Microgrant Application</h1>

  <form action="https://script.google.com/macros/s/AKfycbxlmWRBZ9DcPoWt07r40cTxH0Wb-mvoWKafeoLNdlbOEbypUTAM5V-nIxmNSNwgE8nDtA/exec" method="POST">
    <input type="hidden" name="action" value="submit">

    <label>Full Name</label>
    <input type="text" name="fullName" required>

    <label>Email Address</label>
    <input type="email" name="email" required>

    <label>Project Summary</label>
    <textarea name="projectSummary" rows="5" required></textarea>

    <label>Expected Impact</label>
    <textarea name="impact" rows="5" required></textarea>

    <label>Timeline</label>
    <textarea name="timeline" rows="4" required></textarea>

    <label>Budget Explanation</label>
    <textarea name="budget" rows="4" required></textarea>

    <button type="submit">Submit Application</button>
  </form>

  <br>

  <button onclick="window.location.href='https://nxspaceng.com/microgrant.html'"
          style="background:#555;">
    Exit
  </button>

</body>
</html>
