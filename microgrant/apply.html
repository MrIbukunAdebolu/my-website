<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nexus Microgrant Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 20px;
      font-size: 16px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-right: 10px;
      cursor: pointer;
    }
    .info { background: #eef7ff; padding: 10px; margin-bottom: 20px; border-left: 4px solid #0077cc; }
    .warning { background: #fff4e5; padding: 10px; margin-bottom: 20px; border-left: 4px solid #ff9900; }
    .error { background: #ffe5e5; padding: 10px; margin-bottom: 20px; border-left: 4px solid #cc0000; }
  </style>
</head>

<body>

  <h1>Nexus Microgrant Application</h1>

  <div id="statusBox"></div>

  <!-- USER FORM -->
  <form id="appForm">
    <label>Full Name</label>
    <input type="text" name="fullName" required />

    <label>Email Address</label>
    <input type="email" name="email" required />

    <label>Project Summary</label>
    <textarea name="projectSummary" rows="5" required></textarea>

    <label>Expected Impact</label>
    <textarea name="impact" rows="5" required></textarea>

    <label>Timeline</label>
    <textarea name="timeline" rows="4" required></textarea>

    <label>Budget Explanation</label>
    <textarea name="budget" rows="4" required></textarea>
  </form>

  <button id="saveBtn">Save</button>
  <button id="submitBtn">Submit</button>
  <button id="exitBtn">Exit</button>

  <!-- HIDDEN IFRAME FOR RESPONSES -->
  <iframe name="hiddenFrame" id="hiddenFrame" style="display:none;"></iframe>

  <!-- HIDDEN BACKEND FORMS -->
  <form id="backendForm" method="POST" target="hiddenFrame" style="display:none;">
    <input type="hidden" name="action" />
    <input type="hidden" name="email" />
    <input type="hidden" name="token" />
    <input type="hidden" name="data" />
  </form>

  <script>
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycbxlmWRBZ9DcPoWt07r40cTxH0Wb-mvoWKafeoLNdlbOEbypUTAM5V-nIxmNSNwgE8nDtA/exec";

    const EXIT_REDIRECT = "https://nxspaceng.com/microgrant.html";

    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get("token") || localStorage.getItem("nexus_token") || null;

    const statusBox = document.getElementById("statusBox");
    const form = document.getElementById("appForm");
    const backendForm = document.getElementById("backendForm");
    const iframe = document.getElementById("hiddenFrame");

    function showStatus(msg, type = "info") {
      statusBox.innerHTML = `<div class="${type}">${msg}</div>`;
    }

    function getFormData() {
      const data = {};
      new FormData(form).forEach((value, key) => {
        data[key] = value;
      });
      return data;
    }

    function submitBackend(action, extra = {}) {
      backendForm.action = WEB_APP_URL;

      backendForm.elements["action"].value = action;
      backendForm.elements["email"].value = extra.email || "";
      backendForm.elements["token"].value = extra.token || "";
      backendForm.elements["data"].value = extra.data || "";

      backendForm.submit();
    }

    iframe.onload = function () {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const pre = doc.getElementById("response");
        if (!pre) return;

        const result = JSON.parse(pre.textContent);

        handleResponse(result);
      } catch (e) {
        console.log("Iframe parse error:", e);
      }
    };

    function handleResponse(result) {
      if (!result || !result.status) return;

      if (result.status === "created") {
        token = result.token;
        localStorage.setItem("nexus_token", token);

        const newUrl = window.location.pathname + "?token=" + token;
        window.history.replaceState({}, "", newUrl);

        showStatus("Progress saved. You can resume later.", "info");
        return;
      }

      if (result.status === "success") {
        showStatus("Operation successful.", "info");
        return;
      }

      if (result.status === "locked") {
        showStatus("You have reached the maximum number of saves.", "warning");
        return;
      }

      if (result.status === "expired") {
        showStatus("Your session has expired. Please start again.", "error");
        localStorage.removeItem("nexus_token");
        token = null;
        return;
      }

      if (result.partialData) {
        Object.keys(result.partialData).forEach(key => {
          if (form.elements[key]) form.elements[key].value = result.partialData[key];
        });
        showStatus("Session loaded.", "info");
      }
    }

    function loadSession() {
      if (!token) return;
      submitBackend("load", { token });
    }

    function handleSave(isExit = false) {
      const data = JSON.stringify(getFormData());

      if (!token) {
        submitBackend("createSession", {
          email: form.elements["email"].value,
          data
        });

        if (isExit) window.location.href = EXIT_REDIRECT;
        return;
      }

      submitBackend("save", { token, data });

      if (isExit) window.location.href = EXIT_REDIRECT;
    }

    function handleSubmit() {
      const data = JSON.stringify(getFormData());

      if (!token) {
        submitBackend("submit", {
          email: form.elements["email"].value,
          data
        });
        return;
      }

      submitBackend("submit", { token, data });
      localStorage.removeItem("nexus_token");
    }

    document.getElementById("saveBtn").addEventListener("click", () => handleSave(false));
    document.getElementById("exitBtn").addEventListener("click", () => handleSave(true));
    document.getElementById("submitBtn").addEventListener("click", handleSubmit);

    loadSession();
  </script>
</body>
</html>
