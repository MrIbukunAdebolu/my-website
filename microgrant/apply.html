<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nexus Microgrant Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    textarea, input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0 20px;
      font-size: 16px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-right: 10px;
      cursor: pointer;
    }
    .info {
      background: #eef7ff;
      padding: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #0077cc;
    }
    .warning {
      background: #fff4e5;
      padding: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #ff9900;
    }
    .error {
      background: #ffe5e5;
      padding: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #cc0000;
    }
  </style>
</head>

<body>

  <h1>Nexus Microgrant Application</h1>

  <div id="statusBox"></div>

  <form id="appForm">
    <label>Full Name</label>
    <input type="text" name="fullName" required />

    <label>Email Address</label>
    <input type="email" name="email" required />

    <label>Project Summary</label>
    <textarea name="projectSummary" rows="5" required></textarea>

    <label>Expected Impact</label>
    <textarea name="impact" rows="5" required></textarea>

    <label>Timeline</label>
    <textarea name="timeline" rows="4" required></textarea>

    <label>Budget Explanation</label>
    <textarea name="budget" rows="4" required></textarea>
  </form>

  <button id="saveBtn">Save</button>
  <button id="submitBtn">Submit</button>
  <button id="exitBtn">Exit</button>

  <script>
